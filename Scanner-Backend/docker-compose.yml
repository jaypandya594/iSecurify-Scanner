version: "3.8"

services:
  postgres:
    image: postgres:16-alpine
    container_name: scanner-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "54322:5432" # 🌐 Public access on 54322
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - scanner-network

  redis:
    image: redis:7-alpine
    container_name: scanner-redis
    #    command: redis-server --requirepass ${REDIS_PASSWORD}   # 🔐 MUST for public
    ports:
      - "6379:6379" # 🌐 Public access
    networks:
      - scanner-network

  backend:
    build: .
    container_name: scanner-backend
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://postgres:Tejas%402584@postgres:5432/scanner-db
      - REDIS_HOST=${REDIS_HOST}
      - REDIS_PORT=${REDIS_PORT}
      - QUTTERA_API_KEY=${QUTTERA_API_KEY}
      - JWT_SECRET=${JWT_SECRET}
      - ABUSEIPDB_API_KEY=${ABUSEIPDB_API_KEY}
      - QUTTERA_BASE_URL=${QUTTERA_BASE_URL}
      - FRONTEND_URL= http://localhost:5173/
      - SMTP_SERVER=${SMTP_SERVER}
      - SMTP_PORT=${SMTP_PORT}
      - SMTP_USER=${SMTP_USER}
      - SMTP_PASSWORD=${SMTP_PASSWORD}
      - ADMIN_EMAIL=${ADMIN_EMAIL}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD}
      - RECAPTCHA_SECRET_KEY=${RECAPTCHA_SECRET_KEY}
      - RECAPTCHA_ENABLED=${RECAPTCHA_ENABLED}
    volumes:
      - .:/app
    depends_on:
      - postgres
      - redis
    networks:
      - scanner-network

networks:
  scanner-network:
    external: true

volumes:
  postgres_data:
